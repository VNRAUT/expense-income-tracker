<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1; --income: #22c55e; --expense: #ef4444; 
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --border: #e5e7eb;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f9fafb; --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow: hidden; }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 2000; transition: opacity 0.5s; }
        .login-box { width: 85%; max-width: 320px; background: var(--card); padding: 40px 20px; border-radius: 28px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .login-box h2 { margin-bottom: 10px; font-size: 1.5rem; }
        .pin-field { width: 100%; padding: 15px; border-radius: 16px; border: 2px solid var(--border); margin: 20px 0; background: var(--bg); color: var(--text); font-size: 1.5rem; text-align: center; letter-spacing: 15px; outline: none; transition: border-color 0.3s; }
        .pin-field:focus { border-color: var(--primary); }

        /* App Structure */
        #app-content { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: opacity 0.5s; }
        .tab-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: none; }
        .active-tab { display: block; animation: slideUp 0.4s ease; }

        .balance-card { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; padding: 30px 20px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { cursor: pointer; text-align: center; color: #9ca3af; font-size: 0.7rem; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }
        .nav-item span { display: block; font-size: 1.4rem; }

        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.98); }

        .list-item { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 1rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkAutoLogin()">

<div id="login-screen">
    <div class="login-box">
        <h2>🔒 Unlock</h2>
        <p style="color: #6b7280; font-size: 0.9rem;">Enter your 4-digit PIN</p>
        <input type="password" id="pin-input" class="pin-field" inputmode="numeric" maxlength="4" placeholder="••••" oninput="autoLoginCheck()">
    </div>
</div>

<div id="app-content">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h3 id="app-title" style="margin:0;">Dashboard</h3>
        <span onclick="toggleMode()" style="cursor:pointer; font-size:1.2rem; filter: grayscale(1);" id="mode-icon">🌙</span>
    </div>

    <div id="tab-home" class="tab-content active-tab">
        <div class="balance-card">
            <small style="opacity:0.8">Available Balance</small>
            <h1 id="total-balance" style="margin:5px 0; font-size: 2.2rem;">₹0.00</h1>
        </div>
        <div style="height: 250px; margin-top: 20px;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="tab-add" class="tab-content">
        <div style="background:var(--card); padding:20px; border-radius:24px; border:1px solid var(--border);">
            <label>Date</label><input type="date" id="t-date">
            <label>Type</label><select id="t-type" onchange="loadCats()"><option value="expense">Expense</option><option value="income">Income</option></select>
            <label>Category</label><select id="t-cat"></select>
            <label>Amount (₹)</label><input type="number" id="t-amount" placeholder="0.00">
            <button class="btn btn-primary" onclick="saveEntry()">Save Transaction</button>
        </div>
    </div>
