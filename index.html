<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shraddha's Finance Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1; --income: #22c55e; --expense: #ef4444; 
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --border: #e5e7eb;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f9fafb; --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow: hidden; }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { width: 85%; max-width: 350px; background: var(--card); padding: 40px 20px; border-radius: 24px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .login-box input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin: 20px 0; background: var(--bg); color: var(--text); font-size: 1.1rem; text-align: center; }

        /* App Layout */
        #app-content { display: none; height: 100vh; flex-direction: column; }
        .tab-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: none; animation: fadeIn 0.4s ease; }
        .active-tab { display: block; }

        /* Glassmorphism Balance Card */
        .balance-card { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; padding: 30px 20px; border-radius: 24px; margin-bottom: 25px; position: relative; overflow: hidden; }
        .balance-card::after { content: ''; position: absolute; top: -50%; right: -50%; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; }

        /* Monthly Progress Bar */
        .budget-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .prog-bg { width: 100%; height: 8px; background: var(--border); border-radius: 4px; margin: 12px 0; overflow: hidden; }
        .prog-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* Navigation Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .nav-item { cursor: pointer; text-align: center; color: #9ca3af; font-size: 0.7rem; transition: 0.2s; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 2px; }

        /* Action Buttons */
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.1s; width: 100%; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        
        /* Transaction List */
        .list-item { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .list-item .icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 id="greeting">Welcome Back</h2>
        <p style="color:#6b7280; font-size:0.9rem;">Enter pin to access tracker</p>
        <input type="password" id="pin" placeholder="••••" maxlength="4">
        <button class="btn btn-primary" onclick="unlock()">Unlock</button>
    </div>
</div>

<div id="app-content">
    
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h3 id="app-title">Dashboard</h3>
        <span onclick="toggleMode()" style="cursor:pointer; font-size:1.2rem;" id="mode-icon">🌙</span>
    </div>

    <div id="tab-home" class="tab-content active-tab">
        <div class="balance-card">
            <small style="opacity: 0.8;">Current Balance</small>
            <h1 id="total-balance" style="margin: 5px 0;">₹0.00</h1>
        </div>

        <div class="budget-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 0.9rem; font-weight: 600;">Monthly Budget</span>
                <span id="budget-percent" style="color: var(--primary); font-size: 0.8rem;">0%</span>
            </div>
            <div class="prog-bg"><div id="prog-bar" class="prog-fill"></div></div>
            <small id="budget-info">Spent ₹0 of ₹0</small>
        </div>

        <h4 style="margin: 25px 0 15px 0;">Top Spending</h4>
        <div style="height: 200px; width: 100%;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="tab-add" class="tab-content">
        <h4>New Transaction</h4>
        <div class="budget-card">
            <label style="font-size:0.8rem; font-weight:bold;">Date</label>
            <input type="date" id="t-date" style="width:100%; padding:12px; margin:8px 0 20px 0; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);">
            
            <label style="font-size:0.8rem; font-weight:bold;">Type</label>
            <select id="t-type" onchange="loadCats()" style="width:100%; padding:12px; margin:8px 0 20px 0; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);">
                <option value="expense">Expense (-)</option>
                <option value="income">Income (+)</option>
            </select>

            <label style="font-size:0.8rem; font-weight:bold;">Category</label>
            <select id="t-cat" style="width:100%; padding:12px; margin:8px 0 20px 0; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);"></select>

            <label style="font-size:0.8rem; font-weight:bold;">Amount (₹)</label>
            <input type="number" id="t-amount" placeholder="0.00" style="width:100%; padding:12px; margin:8px 0 25px 0; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:1.2rem;">

            <button class="btn btn-primary" onclick="saveEntry()">Save Transaction</button>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="hist-search" placeholder="Search entries..." onkeyup="refreshUI()" style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text);">
        </div>
        <div id="history-list"></div>
        <button class="btn" style="margin-top:20px; background:none; color:var(--expense); border:1px solid var(--expense);" onclick="resetAll()">Reset All Data</button>
    </div>

    <div id="tab-settings" class="tab-content">
        <h4>App Settings</h4>
        <div class="budget-card">
            <label style="font-size:0.8rem; font-weight:bold;">Set Monthly Budget Limit (₹)</label>
            <input type="number" id="set-budget" onchange="saveBudget()" style="width:100%; padding:12px; margin:10px 0; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text);">
        </div>
        <button class="btn btn-primary" onclick="downloadCSV()">Export Data
