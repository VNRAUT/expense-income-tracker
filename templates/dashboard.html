<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Expense Tracker Dashboard</title>\n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">\n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.7.0/chart.min.css">\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }\n        .summary-card { display: inline-block; width: 30%; padding: 20px; margin: 10px; border: 1px solid #ccc; border-radius: 10px; text-align: center; }\n        .chart-container { width: 100%; height: 400px; margin: 20px 0; }\n        table { width: 100%; border-collapse: collapse; margin-top: 20px; }\n        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }\n    </style>\n</head>\n<body>\n    <h1>Expense Tracker Dashboard</h1>\n    <div class="summary-card">\n        <h2>Total Income</h2>\n        <p>$<span id="total-income">0</span></p>\n    </div>\n    <div class="summary-card">\n        <h2>Total Expenses</h2>\n        <p>$<span id="total-expenses">0</span></p>\n    </div>\n    <div class="summary-card">\n        <h2>Balance</h2>\n        <p>$<span id="balance">0</span></p>\n    </div>\n    <div class="chart-container">\n        <canvas id="incomeChart"></canvas>\n    </div>\n    <div class="chart-container">\n        <canvas id="expenseChart"></canvas>\n    </div>\n    <h2>Recent Transactions</h2>\n    <table>\n        <thead>\n            <tr>\n                <th>Date</th>\n                <th>Description</th>\n                <th>Amount</th>\n            </tr>\n        </thead>\n        <tbody id="transactions-table">\n            <!-- Transaction rows will be inserted here -->\n        </tbody>\n    </table>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.7.0/chart.min.js"></script>\n    <script>\n        // Sample data for charts and transactions\n        const incomeData = [2000, 4000, 3500, 5000]; // Replace with dynamic data\n        const expenseData = [1500, 3000, 2500, 3800]; // Replace with dynamic data\n        const transactions = [\n            { date: '2026-03-01', description: 'Salary', amount: 5000 },\n            { date: '2026-03-03', description: 'Groceries', amount: -200 },\n            { date: '2026-03-05', description: 'Utilities', amount: -150 },\n            { date: '2026-03-10', description: 'Office Supplies', amount: -100 }\n        ];\n\n        // Update summary with dynamic data\n        const totalIncome = incomeData.reduce((a, b) => a + b, 0);\n        const totalExpenses = Math.abs(expenseData.reduce((a, b) => a + b, 0));\n        const balance = totalIncome - totalExpenses;\n\n        document.getElementById('total-income').textContent = totalIncome;\n        document.getElementById('total-expenses').textContent = totalExpenses;\n        document.getElementById('balance').textContent = balance;\n\n        // Populate transactions table\n        transactions.forEach(transaction => {\n            const row = document.createElement('tr');\n            row.innerHTML = `\n                <td>${transaction.date}</td>\n                <td>${transaction.description}</td>\n                <td>$${Math.abs(transaction.amount)}</td>\n            `;\n            document.getElementById('transactions-table').appendChild(row);\n        });\n\n        // Chart.js logic for income\n        const ctxIncome = document.getElementById('incomeChart').getContext('2d');\n        new Chart(ctxIncome, {\n            type: 'bar',\n            data: {\n                labels: ['January', 'February', 'March', 'April'],\n                datasets: [{\n                    label: 'Income',\n                    data: incomeData,\n                    backgroundColor: 'rgba(75, 192, 192, 0.2)',\n                    borderColor: 'rgba(75, 192, 192, 1)',\n                    borderWidth: 1\n                }]\n            },\n            options: {\n                scales: {\n                    y: { beginAtZero: true }\n                }\n            }\n        });\n\n        // Chart.js logic for expenses\n        const ctxExpense = document.getElementById('expenseChart').getContext('2d');\n        new Chart(ctxExpense, {\n            type: 'bar',\n            data: {\n                labels: ['January', 'February', 'March', 'April'],\n                datasets: [{\n                    label: 'Expenses',\n                    data: expenseData,\n                    backgroundColor: 'rgba(255, 99, 132, 0.2)',\n                    borderColor: 'rgba(255, 99, 132, 1)',\n                    borderWidth: 1\n                }]\n            },\n            options: {\n                scales: {\n                    y: { beginAtZero: true }\n                }\n            }\n        });\n    <\/script>\n</body>\n</html>\n
